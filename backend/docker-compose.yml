version: '3.8'

services:
  # PostgreSQL Database (alternative to Supabase for local development)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vaultpass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      
      # Database (use Supabase or local PostgreSQL)
      SUPABASE_URL: https://your-project.supabase.co
      SUPABASE_KEY: your-key
      
      # JWT
      JWT_SECRET: your-test-secret-key-change-in-production
      JWT_EXPIRY: 7d
      
      # Blockchain RPC URLs
      RPC_URL_ETHEREUM: https://eth-mainnet.g.alchemy.com/v2/your-key
      RPC_URL_BASE: https://base-mainnet.g.alchemy.com/v2/your-key
      RPC_URL_POLYGON: https://polygon-mainnet.g.alchemy.com/v2/your-key
      
      # Smart Contract
      CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
      
      # Email
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: your-email@gmail.com
      SMTP_PASS: your-app-password
      
      # Push Protocol
      PUSH_PROTOCOL_KEY: your-key
      
      # Configuration
      GRACE_PERIOD_DAYS: 7
      CHECKIN_REMINDER_DAYS: 3
      
      # Features
      ENABLE_EMAIL_NOTIFICATIONS: "true"
      ENABLE_PUSH_NOTIFICATIONS: "true"
      ENABLE_BLOCKCHAIN_LISTENER: "true"
    
    depends_on:
      postgres:
        condition: service_healthy
    
    volumes:
      - ./src:/app/src
      - /app/node_modules
    
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: vaultpass-network
